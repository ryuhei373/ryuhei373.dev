name: Notify Share Links After Deploy

on:
  check_run:
    types: [completed]

permissions:
  contents: read

jobs:
  notify:
    if: >-
      github.event.check_run.name == 'Workers Builds: ryuhei373' &&
      github.event.check_run.conclusion == 'success' &&
      github.event.check_run.check_suite.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.check_run.head_sha }}
          fetch-depth: 2

      - name: Get new blog posts
        id: new-posts
        run: |
          # 新規追加されたファイルのみ取得（--no-renamesでリネーム検出を無効化）
          NEW_FILES=$(git diff --no-renames --name-only --diff-filter=A HEAD~1 HEAD -- 'content/blog/*.md')

          if [ -z "$NEW_FILES" ]; then
            echo "No new blog posts found"
            echo "has_new_posts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_new_posts=true" >> "$GITHUB_OUTPUT"

          # 最初の新規ファイルを処理（複数記事の同時追加は想定外）
          FILE=$(echo "$NEW_FILES" | head -n 1)
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

          # frontmatterからタイトルを取得
          TITLE=$(sed -n '/^---$/,/^---$/p' "$FILE" | grep '^title:' | sed 's/^title: *//')
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

          # ファイル名からスラッグを取得（例: 2026-01-12.md -> 2026-01-12）
          SLUG=$(basename "$FILE" .md)
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

          # URLを生成
          URL="https://ryuhei373.dev/blog/$SLUG"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Notify Slack with share links
        if: steps.new-posts.outputs.has_new_posts == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          TITLE="${{ steps.new-posts.outputs.title }}"
          URL="${{ steps.new-posts.outputs.url }}"

          # URLエンコード（jqを使用）
          ENCODED_TEXT=$(printf '%s' "$TITLE $URL" | jq -sRr @uri)
          X_INTENT="https://twitter.com/intent/tweet?text=${ENCODED_TEXT}"
          BSKY_INTENT="https://bsky.app/intent/compose?text=${ENCODED_TEXT}"

          # Slack Block Kit でボタン付きメッセージを構築
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg x_intent "$X_INTENT" \
            --arg bsky_intent "$BSKY_INTENT" \
            '{
              text: "新しいブログ記事が公開されました: \($title)",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "📢 新しいブログ記事が公開されました\n\($title)\n\($url)"
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: {type: "plain_text", text: "X でポスト"},
                      url: $x_intent
                    },
                    {
                      type: "button",
                      text: {type: "plain_text", text: "Bluesky でポスト"},
                      url: $bsky_intent
                    }
                  ]
                }
              ]
            }')

          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
