name: Notify After Deploy

on:
  check_run:
    types: [completed]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    if: >-
      github.event.check_run.name == 'Workers Builds: ryuhei373' &&
      github.event.check_run.conclusion == 'success' &&
      github.event.check_run.check_suite.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.check_run.head_sha }}
          fetch-depth: 2

      - name: Resolve deploy ref (PR fallback to commit)
        id: ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.check_run.head_sha }}"

          # PR を逆引き（merge コミットの SHA が含まれる merged PR を探す）
          PR_INFO=$(gh pr list --state merged --search "$SHA" \
            --json number,title,url --jq '.[0]' || echo "null")

          if [ "$PR_INFO" != "null" ] && [ -n "$PR_INFO" ]; then
            REF_LABEL="#$(echo "$PR_INFO" | jq -r '.number')"
            REF_TITLE=$(echo "$PR_INFO" | jq -r '.title')
            REF_URL=$(echo "$PR_INFO" | jq -r '.url')
          else
            # 直接 push 等で PR が見つからない場合は commit に fallback
            REF_LABEL=$(git rev-parse --short "$SHA")
            REF_TITLE=$(git log -1 --pretty=%s "$SHA")
            REF_URL="${{ github.server_url }}/${{ github.repository }}/commit/$SHA"
          fi

          {
            echo "label=$REF_LABEL"
            echo "title=$REF_TITLE"
            echo "url=$REF_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Get new blog posts
        id: new-posts
        run: |
          # 新規追加されたファイルのみ取得（--no-renamesでリネーム検出を無効化）
          NEW_FILES=$(git diff --no-renames --name-only --diff-filter=A HEAD~1 HEAD -- 'content/blog/*.md')

          if [ -z "$NEW_FILES" ]; then
            echo "has_new_posts=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_new_posts=true" >> "$GITHUB_OUTPUT"

          # 最初の新規ファイルを処理（複数記事の同時追加は想定外）
          FILE=$(echo "$NEW_FILES" | head -n 1)

          # frontmatterからタイトルを取得
          TITLE=$(sed -n '/^---$/,/^---$/p' "$FILE" | grep '^title:' | sed 's/^title: *//')

          # ファイル名からスラッグを取得（例: 2026-01-12.md -> 2026-01-12）
          SLUG=$(basename "$FILE" .md)

          {
            echo "title=$TITLE"
            echo "url=https://ryuhei373.dev/blog/$SLUG"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          REF_LABEL="${{ steps.ref.outputs.label }}"
          REF_TITLE="${{ steps.ref.outputs.title }}"
          REF_URL="${{ steps.ref.outputs.url }}"
          HAS_BLOG="${{ steps.new-posts.outputs.has_new_posts }}"
          TITLE="${{ steps.new-posts.outputs.title }}"
          URL="${{ steps.new-posts.outputs.url }}"

          # デプロイ完了 block（必ず含める）
          BASE_BLOCK=$(jq -n \
            --arg label "$REF_LABEL" \
            --arg title "$REF_TITLE" \
            --arg url "$REF_URL" \
            '{
              type: "section",
              text: {
                type: "mrkdwn",
                text: "✅ デプロイ完了\n<\($url)|\($label)> \($title)"
              }
            }')

          # ブログ更新がある場合のみ追加 block を構築
          if [ "$HAS_BLOG" = "true" ]; then
            ENCODED_TEXT=$(printf '%s' "$TITLE $URL" | jq -sRr @uri)
            X_INTENT="https://twitter.com/intent/tweet?text=${ENCODED_TEXT}"
            BSKY_INTENT="https://bsky.app/intent/compose?text=${ENCODED_TEXT}"

            BLOG_BLOCKS=$(jq -n \
              --arg title "$TITLE" \
              --arg url "$URL" \
              --arg x_intent "$X_INTENT" \
              --arg bsky_intent "$BSKY_INTENT" \
              '[
                {type: "divider"},
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: "📢 新しいブログ記事が公開されました\n\($title)\n\($url)"
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {type: "button", text: {type: "plain_text", text: "X でポスト"}, url: $x_intent},
                    {type: "button", text: {type: "plain_text", text: "Bluesky でポスト"}, url: $bsky_intent}
                  ]
                }
              ]')
            FALLBACK="デプロイ完了 / 新規記事: $TITLE"
          else
            BLOG_BLOCKS="[]"
            FALLBACK="デプロイ完了: $REF_TITLE"
          fi

          PAYLOAD=$(jq -n \
            --arg fallback "$FALLBACK" \
            --argjson base "$BASE_BLOCK" \
            --argjson blog "$BLOG_BLOCKS" \
            '{
              text: $fallback,
              blocks: ([$base] + $blog)
            }')

          curl -fsS -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
